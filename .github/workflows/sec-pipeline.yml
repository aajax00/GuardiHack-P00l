name: GuardiHack P00l Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sast-and-linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit pip-audit
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Linting with Flake8 (Qualité du code)
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe Python
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avertissements généraux (ne bloque pas le build)
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: SAST with Bandit (Analyse de code statique)
        run: |
          # Cherche des failles de sécurité dans le code Python (mots de passe en dur, failles SQLi...)
          bandit -r backend/app -c "bandit.yml" || true

      - name: SCA with pip-audit (Vérification des dépendances)
        run: |
          # Vérifie si FastAPI ou uvicorn ont des failles connues (CVE)
          pip-audit -r backend/requirements.txt